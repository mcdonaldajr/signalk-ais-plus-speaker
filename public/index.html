<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AIS Plus Speaker</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>AIS Plus Speaker</h1>
          <p id="connectionText">Connecting...</p>
        </div>
        <div id="statusPill" class="pill">Idle</div>
      </section>

      <section class="panel controls">
        <label class="check">
          <input id="enabled" type="checkbox">
          <span>Enabled</span>
        </label>

        <label>
          <span>Signal K server</span>
          <input id="signalKUrl" type="url" placeholder="http://nemo3.local:3000">
        </label>

        <label>
          <span>Piper voice</span>
          <select id="voice"></select>
        </label>

        <label class="check">
          <input id="stereoPing" type="checkbox">
          <span>Directional pings</span>
        </label>

        <div class="sliderGrid">
          <label>
            <span>Announcement volume <output id="speechVolumeValue"></output></span>
            <input id="speechVolume" type="range" min="0" max="1.5" step="0.05">
          </label>
          <label>
            <span>Ping volume <output id="pingVolumeValue"></output></span>
            <input id="pingVolume" type="range" min="0" max="4" step="0.1">
          </label>
        </div>

        <div class="buttonRow">
          <button id="saveButton" type="button">Save</button>
          <button id="accessButton" type="button">Request Signal K Access</button>
          <button id="pollAccessButton" type="button">Check Access</button>
          <button id="testButton" type="button">Sound Check</button>
          <button id="repeatButton" type="button">Repeat Last</button>
          <button id="clearBufferButton" type="button">Clear Buffer</button>
        </div>
        <p class="subtle">Buffer: <span id="queueCount">0</span> message(s)</p>
        <p id="accessStatus" class="subtle">Signal K access not checked.</p>
      </section>

      <section class="panel">
        <h2>Last Message</h2>
        <p id="lastMessage" class="message">No AIS Plus message received yet.</p>
      </section>

      <section class="panel">
        <h2>Recent Events</h2>
        <div id="events" class="events"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
